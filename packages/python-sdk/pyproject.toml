[project]
name = "settle-protocol-sdk"
version = "0.2.0"
description = "Settle protocol SDK for Python — receipt kernel, verifyReceipt, and LangChain + CrewAI adapters."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Settle Protocol contributors" }]
keywords = ["settle", "solana", "agent-payments", "receipts", "blake3", "langchain", "crewai"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security :: Cryptography",
]
dependencies = [
    "blake3>=0.3.4",
]

[project.urls]
Homepage = "https://settle.so"
Repository = "https://github.com/Pratiikpy/settle-protocol"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["settle_sdk", "settle_sdk.adapters"]
