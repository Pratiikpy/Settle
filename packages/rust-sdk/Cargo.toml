[package]
name = "settle-sdk"
version = "0.1.0"
edition = "2021"
description = "Settle Protocol SDK — kernel commit + receipt verification, byte-identical to the TypeScript and Python SDKs."
license = "MIT"
repository = "https://github.com/settle-protocol/settle"
readme = "README.md"

[dependencies]
blake3 = "1.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
unicode-normalization = "0.1"
hex = "0.4"
sha2 = "0.10"

[dev-dependencies]
serde_json = "1.0"

[lib]
name = "settle_sdk"
path = "src/lib.rs"
