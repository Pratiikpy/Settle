[toolchain]
anchor_version = "0.31.1"
# solana_version pin removed 2026-05-02 — host has Solana 3.1.14 Agave.
# Anchor 0.31.1 is compatible with both 2.x and 3.x runtime; re-pin if a
# future deploy needs a specific 2.x feature gate.

[features]
resolution = true
skip-lint = false

[programs.devnet]
settle_agent_card = "HU4piq8bwYFast81U6e8huYVb8JaY44chWE8QVGT77nD"

[programs.localnet]
settle_agent_card = "HU4piq8bwYFast81U6e8huYVb8JaY44chWE8QVGT77nD"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
url = "https://api.devnet.solana.com"

[[test.validator.clone]]
# Devnet USDC mint
address = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
